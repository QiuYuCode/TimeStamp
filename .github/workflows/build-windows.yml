name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeStamp-Windows-Installer
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: TimeStamp ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 更新内容
            - 自动构建 Windows 安装包。
            - 完整变更会附加在下方自动生成的发布说明中。

            ## 修复项
            - 修复项会从本版本提交记录中自动汇总。
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
